<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ATS Pro - {{ mode.capitalize() }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #1e293b;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
        }
        .toggle-link { color: #00e5ff; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 style="color: #00e5ff;"><i class="fas fa-rocket"></i> ATSPRO</h1>
        <h2>{{ mode.capitalize() }}</h2>
        
        <form method="POST" action="/{{ mode }}">
            <input type="text" name="username" class="auth-input" placeholder="Username" required>
            <input type="password" name="password" class="auth-input" placeholder="Password" required>
            <button type="submit" style="margin-top: 20px;">{{ mode.capitalize() }}</button>
        </form>

        <p style="margin-top: 20px;">
            {% if mode == 'login' %}
                New here? <a href="/signup" class="toggle-link">Create Account</a>
            {% else %}
                Already have an account? <a href="/login" class="toggle-link">Login here</a>
            {% endif %}
        </p>
    </div>
</body>
</html>
